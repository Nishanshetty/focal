name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: false

jobs:
  build-macos:
    name: Build macOS universal binary
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (universal binary)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target universal-apple-darwin
          # On version tags, publish a GitHub Release with the .dmg attached.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: Focal ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for what changed in this release.
          releaseDraft: ${{ !startsWith(github.ref, 'refs/tags/') }}
          prerelease: false

      - name: Upload .dmg artifact (non-tag builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: Focal-macOS-universal
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: ignore
          retention-days: 14
